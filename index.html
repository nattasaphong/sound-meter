<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.header {
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.controls {
  padding: 0 20px;
}

select {
  padding:8px;
  margin:10px;
  border-radius:8px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
  padding:20px;
}

.card {
  background: linear-gradient(135deg,#1e293b,#334155);
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card h3 { margin:0; font-size:14px; opacity:0.7;}
.card h1 { margin:10px 0 0; }

.charts {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px;
  padding:20px;
}

canvas {
  background:#1e293b;
  border-radius:16px;
  padding:10px;
}

.table {
  padding:20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #334155;
}

tr:hover {
  background:#1e293b;
}
</style>
</head>

<body>

<div class="header">📊 Dashboard เครื่องปลิดถั่ว</div>

<div class="controls">
  เดือน: <select id="month"></select>
  เกษตรกร: <select id="farmer"></select>
</div>

<div class="grid">
  <div class="card"><h3>ค่าใช้จ่าย</h3><h1 id="cost"></h1></div>
  <div class="card"><h3>ยอดจ่าย</h3><h1 id="pay"></h1></div>
  <div class="card"><h3>กำไร/ขาดทุน</h3><h1 id="profit"></h1></div>
</div>

<div class="charts">
  <canvas id="bar"></canvas>
  <canvas id="pie"></canvas>
</div>

<div class="table">
  <table>
    <thead>
      <tr>
        <th>วัน</th>
        <th>เกษตรกร</th>
        <th>รายการ</th>
        <th>ค่าใช้จ่าย</th>
        <th>ยอดจ่าย</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const url = "https://opensheet.elk.sh/1yuiqa-hxYMu7YvPp6mGybYaYm1r6OhXKHeYBHKP4C5U/1";

let data = [];

fetch(url).then(r=>r.json()).then(d=>{
  data = d;
  init();
});

function getMonth(d){
  if(!d) return "";
  let p = d.split("/");
  return p[1]+"/"+p[2];
}

function init(){
  const months = [...new Set(data.map(d=>getMonth(d["วันเวลา"])))];
  const farmers = [...new Set(data.map(d=>d["ชื่อเกษตรกร"]))];

  months.forEach(m=>{
    month.innerHTML += `<option>${m}</option>`;
  });

  farmer.innerHTML = `<option value="">ทั้งหมด</option>`;
  farmers.forEach(f=>{
    farmer.innerHTML += `<option>${f}</option>`;
  });

  month.onchange = update;
  farmer.onchange = update;

  update();
}

let barChart, pieChart;

function update(){
  let m = month.value;
  let f = farmer.value;

  let filtered = data.filter(d=>{
    return getMonth(d["วันเวลา"])===m &&
           (f=="" || d["ชื่อเกษตรกร"]===f);
  });

  let cost=0, pay=0;

  filtered.forEach(d=>{
    cost += Number(d["ค่าใช้จ่าย"]||0);
    pay += Number(d["ยอดเงินที่ต้องจ่าย"]||0);
  });

  let profit = cost - pay;

  costEl.innerText = cost;
  payEl.innerText = pay;
  profitEl.innerText = profit;

  drawChart(cost,pay);
  drawTable(filtered);
}

function drawChart(cost,pay){
  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  barChart = new Chart(bar,{
    type:'bar',
    data:{
      labels:["ค่าใช้จ่าย","ยอดจ่าย"],
      datasets:[{data:[cost,pay]}]
    }
  });

  pieChart = new Chart(pie,{
    type:'doughnut',
    data:{
      labels:["ค่าใช้จ่าย","ยอดจ่าย"],
      datasets:[{data:[cost,pay]}]
    }
  });
}

function drawTable(rows){
  tableBody.innerHTML = "";
  rows.forEach(r=>{
    tableBody.innerHTML += `
    <tr>
      <td>${r["วันเวลา"]}</td>
      <td>${r["ชื่อเกษตรกร"]}</td>
      <td>${r["รายการ"]}</td>
      <td>${r["ค่าใช้จ่าย"]}</td>
      <td>${r["ยอดเงินที่ต้องจ่าย"]}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
