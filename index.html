<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#f4f6f9; padding:20px;}
.card {
  background:white; padding:20px; margin:10px;
  border-radius:12px; display:inline-block; width:30%;
  text-align:center; font-size:20px;
}
select { padding:10px; margin-bottom:20px;}
canvas { background:white; border-radius:12px; margin-top:20px;}
</style>
</head>

<body>

<h2>📊 Dashboard รายได้/ค่าใช้จ่าย</h2>

<select id="monthFilter"></select>

<div>
  <div class="card">ค่าใช้จ่ายรวม<br><b id="cost"></b></div>
  <div class="card">ยอดจ่ายรวม<br><b id="pay"></b></div>
  <div class="card">กำไร/ขาดทุน<br><b id="profit"></b></div>
</div>

<canvas id="barChart"></canvas>

<script>
const url = "https://opensheet.elk.sh/1yuiqa-hxYMu7YvPp6mGybYaYm1r6OhXKHeYBHKP4C5U/1";
const sheetName = "บัญชีรายได้เครื่องปลิด"; // เปลี่ยนถ้าชื่อไม่ใช่ Sheet1

const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

let data = [];

fetch(url)
.then(res => res.json())
.then(json => {
  data = json;
  init();
});

function getMonth(dateStr){
  if(!dateStr) return "";
  // รองรับวันที่แบบไทย 8/4/2569
  let parts = dateStr.split("/");
  if(parts.length < 3) return "";
  return parts[1] + "/" + parts[2]; // เดือน/ปี
}

function init() {
  const months = [...new Set(data.map(d => getMonth(d["วันเวลา"])))];

  const select = document.getElementById("monthFilter");

  months.forEach(m => {
    let opt = document.createElement("option");
    opt.value = m;
    opt.text = m;
    select.appendChild(opt);
  });

  select.onchange = update;
  update();
}

function update() {
  const month = document.getElementById("monthFilter").value;

  const filtered = data.filter(d => getMonth(d["วันเวลา"]) === month);

  let cost = 0, pay = 0;

  filtered.forEach(d => {
    cost += Number(d["ค่าใช้จ่าย"] || 0);
    pay += Number(d["ยอดเงินที่ต้องจ่าย"] || 0);
  });

  const profit = cost - pay;

  document.getElementById("cost").innerText = cost;
  document.getElementById("pay").innerText = pay;
  document.getElementById("profit").innerText = profit;

  drawChart(cost, pay);
}

let chart;

function drawChart(cost, pay){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels: ["ค่าใช้จ่าย", "ยอดจ่าย"],
      datasets: [{
        label: "จำนวนเงิน",
        data: [cost, pay]
      }]
    }
  });
}
</script>

</body>
</html>
