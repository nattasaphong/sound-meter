<script>
const url = "https://opensheet.elk.sh/1Bh2Bve7j-0mHOZch8BqR25zzDyiDNbiESpswe4lYLZc/0";

let data = [];

fetch(url)
.then(r=>r.json())
.then(d=>{
  console.log("DATA:", d);
  data = d;
  init();
});

function getMonth(d){
  if(!d) return "";
  let p = d.split("/");
  return p[1]+"/"+p[2];
}

function init(){
  const months = [...new Set(data.map(d=>getMonth((d["วันเวลา"]||"").trim())))];
  const farmers = [...new Set(data.map(d=>(d["ชื่อเกษตรกร"]||"ไม่ระบุ").trim()))];

  month.innerHTML = "";
  months.forEach(m=>{
    month.innerHTML += `<option>${m}</option>`;
  });

  farmer.innerHTML = `<option value="">ทั้งหมด</option>`;
  farmers.forEach(f=>{
    farmer.innerHTML += `<option>${f}</option>`;
  });

  month.onchange = update;
  farmer.onchange = update;

  update();
}

let barChart, pieChart;

function update(){
  let m = month.value;
  let f = farmer.value;

  let filtered = data.filter(d=>{
    let date = (d["วันเวลา"]||"").trim();
    let farmerName = (d["ชื่อเกษตรกร"]||"ไม่ระบุ").trim();
    return getMonth(date)===m && (f=="" || farmerName===f);
  });

  let cost=0, pay=0;
  let map={};

  filtered.forEach(d=>{
    let date = (d["วันเวลา"]||"").trim();
    let farmerName = (d["ชื่อเกษตรกร"]||"ไม่ระบุ").trim();

    let c = Number(d["ค่าใช้จ่าย"])||0;
    let p = Number(d["ยอดเงินที่ต้องจ่าย"])||0;

    cost += c;
    pay += p;

    if(!map[date]) map[date]={};
    if(!map[date][farmerName]) map[date][farmerName]=0;

    map[date][farmerName]+=p;
  });

  document.getElementById("cost").innerText = cost.toLocaleString();
  document.getElementById("pay").innerText = pay.toLocaleString();
  document.getElementById("profit").innerText = (cost-pay).toLocaleString();

  drawChart(map);
  drawTable(filtered);
}

function drawChart(map){

  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  let labels = Object.keys(map);

  labels.sort((a,b)=>{
    let pa=a.split("/"), pb=b.split("/");
    return new Date(pa[2],pa[1]-1,pa[0]) - new Date(pb[2],pb[1]-1,pb[0]);
  });

  let farmers = [...new Set(Object.values(map).flatMap(o=>Object.keys(o)))];

  const colors = ["#60a5fa","#34d399","#f87171","#fbbf24","#a78bfa","#22d3ee"];

  let datasets = farmers.map((f,i)=>{
    return {
      label:f,
      data: labels.map(d=> map[d][f]||0),
      backgroundColor: colors[i % colors.length]
    }
  });

  barChart = new Chart(document.getElementById("bar"),{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,
      plugins:{legend:{position:'top'}},
      scales:{
        x:{stacked:true},
        y:{stacked:true}
      }
    }
  });

  let totalCost=0, totalPay=0;

  Object.values(map).forEach(day=>{
    Object.values(day).forEach(v=>{
      totalPay+=v;
    });
  });

  pieChart = new Chart(document.getElementById("pie"),{
    type:'doughnut',
    data:{
      labels:["ยอดจ่ายรวม"],
      datasets:[{data:[totalPay]}]
    }
  });
}

function drawTable(rows){
  tableBody.innerHTML="";

  rows.forEach(r=>{
    tableBody.innerHTML+=`
    <tr>
      <td>${r["วันเวลา"]||""}</td>
      <td>${r["ชื่อเกษตรกร"]||""}</td>
      <td>${r["รายการ"]||""}</td>
      <td>${r["ค่าใช้จ่าย"]||0}</td>
      <td>${r["ยอดเงินที่ต้องจ่าย"]||0}</td>
    </tr>`;
  });
}
</script>
